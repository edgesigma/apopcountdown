<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apophis Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./widget.css?v=6">
</head>
<body>
  <div class="viewer-wrap" id="viewer-container">
    <div class="viewer-loading" id="viewer-loading">
      <span class="spinner"></span>
      <span>Initializing renderer...</span>
    </div>
    <div class="viewer-hud">
      <div class="viewer-hud-left">
        <button class="hud-btn" id="btn-orbital">orbit</button>
        <button class="hud-btn active" id="btn-approach">flyby</button>
      </div>
      <div class="viewer-hud-center">
        <div class="hud-countdown" id="countdown">
          <span class="cd-val" id="cd-years">-</span><span class="cd-lbl">y</span>
          <span class="cd-sep">:</span>
          <span class="cd-val" id="cd-days">-</span><span class="cd-lbl">d</span>
          <span class="cd-sep">:</span>
          <span class="cd-val" id="cd-hours">-</span><span class="cd-lbl">h</span>
          <span class="cd-sep">:</span>
          <span class="cd-val" id="cd-minutes">-</span><span class="cd-lbl">m</span>
          <span class="cd-sep">:</span>
          <span class="cd-val" id="cd-seconds">-</span><span class="cd-lbl">s</span>
        </div>
      </div>
      <div class="viewer-hud-right">
        <div class="hud-data">
          <span class="hud-label">DIST</span>
          <span class="hud-value" id="viewer-distance">--</span>
        </div>
        <div class="hud-data">
          <span class="hud-label">VEL</span>
          <span class="hud-value" id="viewer-speed">--</span>
        </div>
      </div>
    </div>

    <!-- Vote CTA -->
    <button class="vote-cta" id="vote-cta">
      <span class="vote-cta-text" id="vote-cta-text">Cast your vote!</span>
    </button>

    <!-- Vote modal -->
    <div class="vote-modal" id="vote-modal">
      <div class="vote-modal-inner">
        <button class="vote-modal-close" id="vote-modal-close">&times;</button>
        <div class="vote-question">Should it hit?</div>
        <div class="vote-buttons" id="vote-buttons">
          <button class="vote-btn vote-yes" id="vote-yes" data-vote="yes">YES</button>
          <button class="vote-btn vote-no" id="vote-no" data-vote="no">NO</button>
        </div>
        <div class="vote-results" id="vote-results" style="display:none;">
          <div class="vote-bar-wrap">
            <div class="vote-bar vote-bar-yes" id="vote-bar-yes" style="width:50%">
              <span class="vote-bar-label">YES <span id="vote-pct-yes">--</span>%</span>
            </div>
            <div class="vote-bar vote-bar-no" id="vote-bar-no" style="width:50%">
              <span class="vote-bar-label">NO <span id="vote-pct-no">--</span>%</span>
            </div>
          </div>
          <div class="vote-total" id="vote-total"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="widget-footer">
    <span class="footer-credit">
      <a href="https://apophiscountdown.com" target="_blank">apophiscountdown.com</a>
    </span>
  </div>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <!-- Same viewer modules as the main page -->
  <script src="../js/api-client.js?v=6"></script>
  <script src="../viewer/constants.js?v=6"></script>
  <script src="../viewer/earth.js?v=6"></script>
  <script src="../viewer/asteroid.js?v=6"></script>
  <script src="../viewer/orbit.js?v=6"></script>
  <script src="../viewer/controls.js?v=6"></script>
  <script src="../viewer/lighting.js?v=6"></script>
  <script src="../viewer/viewer.js?v=6"></script>
  <script src="../js/countdown.js?v=6"></script>
  <script src="../js/vote.js?v=6"></script>
</body>
</html>
